<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マイページ — Festival Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="centered-page">
  <nav class="app-nav">
    <span class="who" id="who">読み込み中...</span>
    <div class="app-nav-links">
      <a href="map.html" class="nav-link">マップ</a>
      <a href="events.html" class="nav-link">イベント</a>
      <a href="dashboard.html" class="nav-link is-active">グループ</a>
      <a href="shifts.html" class="nav-link">シフト</a>
    </div>
    <div class="app-nav-right">
      <button class="link-button" id="logout-btn">ログアウト</button>
    </div>
  </nav>

  <div class="card">
    <p class="brand">FESTIVAL MAP</p>
    <div class="card-header-row">
      <h1 style="margin:0;">参加しているグループ</h1>
      <div class="inline-actions">
        <button type="button" class="button-secondary" id="open-create-group-modal">＋ 作成</button>
        <button type="button" class="button-secondary" id="open-join-group-modal">＋ 参加</button>
      </div>
    </div>

    <div class="message" id="group-message" role="alert"></div>

    <ul class="group-list" id="group-list">
      <li class="group-empty" id="group-empty">まだどのグループにも参加していません</li>
    </ul>
  </div>

  <div class="modal-backdrop" id="create-group-modal" hidden>
    <div class="modal">
      <h2 class="section-title">グループを作成する</h2>
      <form id="create-group-form">
        <div class="field">
          <label for="new-group-name">グループ名</label>
          <input type="text" id="new-group-name" placeholder="例: ○○サークル 模擬店係" required>
        </div>
        <div class="field">
          <label for="new-group-event">参加するイベント</label>
          <select id="new-group-event" required>
            <option value="">イベントを選択してください</option>
          </select>
        </div>
        <button type="submit" class="primary">作成する</button>
      </form>
      <button class="link-button" id="close-create-group-modal" style="width:100%; margin-top:10px;">閉じる</button>
    </div>
  </div>

  <div class="modal-backdrop" id="join-group-modal" hidden>
    <div class="modal">
      <h2 class="section-title">招待コードで参加する</h2>
      <form id="join-group-form">
        <div class="field">
          <label for="invite-code-input">招待コード</label>
          <input type="text" id="invite-code-input" placeholder="8桁のコード" required>
        </div>
        <button type="submit" class="primary">参加する</button>
      </form>
      <button class="link-button" id="close-join-group-modal" style="width:100%; margin-top:10px;">閉じる</button>
    </div>
  </div>

  <!-- 招待コードを一度だけ表示するモーダル -->
  <div class="modal-backdrop" id="code-modal" hidden>
    <div class="modal">
      <h2 class="section-title" id="code-modal-title">招待コード</h2>
      <p class="modal-note">このコードは今しか表示されません。参加してほしい人に安全な方法で伝えてください。</p>
      <div class="code-display" id="code-display"></div>
      <button class="primary" id="code-copy-btn">コピーする</button>
      <button class="link-button" id="code-close-btn" style="width:100%; margin-top:10px;">閉じる</button>
    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
