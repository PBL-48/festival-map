<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Festival Map — シフト可視化</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-light">
  <header class="bg-primary text-white py-3 px-3">
    <h1 class="h4 fw-bold mb-0">Festival Map — シフト可視化</h1>
  </header>

  <div class="container-fluid py-3">
    <section class="card shadow-sm border-0 mb-3 w-100">
      <div class="card-body">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-3">
          <div>
            <h2 class="h5 fw-bold mb-1">入力</h2>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-12">
            <div class="border rounded-3 bg-white p-3">
              <div class="row g-3 align-items-end">
                <div class="col-12 col-lg-6">
                  <label class="form-label fw-semibold" for="shiftsFile">シフトCSV</label>
                  <input id="shiftsFile" class="form-control" type="file" accept=".csv" />
                </div>
                <div class="col-12 col-lg-6">
                  <label class="form-label fw-semibold d-block">保存</label>
                  <div class="d-grid gap-2 d-sm-flex">
                    <button id="saveShifts" class="btn btn-primary flex-fill">このデバイス・ブラウザに保存</button>
                    <button id="clearShifts" class="btn btn-outline-danger flex-fill">保存をクリア</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12">
            <div class="border rounded-3 bg-white p-3">
              <h3 class="h6 fw-bold mb-2">CSVの形式</h3>
              <div class="small text-muted mb-2">場所の識別に <span>stall_name</span>（企画名）を使用するため、企画名は登録通りに正確に入力してください。</div>
              <div id="sampleShiftPreview" class="sample-preview"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="card shadow-sm border-0">
      <div class="card-body">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-3">
          <div>
            <h2 class="h5 fw-bold mb-1">出力</h2>
          </div>
        </div>

        <div class="row g-3 align-items-stretch">
          <div class="col-12 col-lg-8">
            <div id="map" class="map-frame"></div>
          </div>
          <div class="col-12 col-lg-4">
            <aside id="sidebar" class="sidebar-frame h-100 p-3">
              <h5 class="fw-bold">現在シフト中</h5>
              <ul id="activeList" class="list-group list-group-flush"></ul>
            </aside>
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer class="px-3 pb-3 pt-2 text-muted small">
    <small>CSVフォーマットはREADMEを参照してください。</small>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
