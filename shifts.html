<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>シフト — Festival Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="app-nav">
    <span class="who" id="who">読み込み中...</span>
    <div class="app-nav-links">
      <a href="map.html" class="nav-link">マップ</a>
      <a href="dashboard.html" class="nav-link">グループ</a>
      <a href="shifts.html" class="nav-link is-active">シフト</a>
    </div>
    <div class="app-nav-right">
      <button class="link-button" id="logout-btn">ログアウト</button>
    </div>
  </nav>

  <div class="message" id="shift-message" role="alert"></div>

  <!-- シフト提出 -->
  <div class="card">
    <h2 class="section-title">シフトを提出する</h2>

    <form id="shift-form">
      <div class="field">
        <label for="shift-group-select">提出するグループ</label>
        <select id="shift-group-select" required>
          <option value="">グループを選択してください</option>
        </select>
      </div>

      <ul class="member-chips" id="circle-members">
        <li class="empty">グループを選択するとメンバーが表示されます</li>
      </ul>

      <div class="field">
        <label for="shift-event-select">イベント(任意)</label>
        <select id="shift-event-select">
          <option value="">選択しない</option>
        </select>
      </div>
      <button type="button" class="quick-add-toggle" id="toggle-new-event">+ 新しいイベントを追加</button>
      <div class="quick-add-box" id="new-event-box" hidden>
        <input type="text" id="new-event-name" placeholder="イベント名(例: 五月祭)">
        <button type="button" class="button-secondary" id="add-event-btn">追加</button>
      </div>

      <div class="field">
        <label for="shift-booth-select">ブース(任意・イベント選択後に選べます)</label>
        <select id="shift-booth-select" disabled>
          <option value="">選択しない</option>
        </select>
      </div>
      <button type="button" class="quick-add-toggle" id="toggle-new-booth" disabled>+ 新しいブースを追加</button>
      <div class="quick-add-box" id="new-booth-box" hidden>
        <input type="text" id="new-booth-name" placeholder="ブース名(例: たこ焼き店)">
        <button type="button" class="button-secondary" id="add-booth-btn">追加</button>
      </div>

      <div class="field">
        <label for="shift-date">日付</label>
        <input type="date" id="shift-date" required>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="shift-start">開始時刻</label>
          <input type="time" id="shift-start" required>
        </div>
        <div class="field">
          <label for="shift-end">終了時刻</label>
          <input type="time" id="shift-end" required>
        </div>
      </div>

      <div class="field">
        <label for="shift-note">メモ(任意)</label>
        <textarea id="shift-note" placeholder="例: 前半のみ / 撤収まで対応可"></textarea>
      </div>

      <button type="submit" class="primary">シフトを提出する</button>
    </form>
  </div>

  <!-- シフト閲覧 -->
  <div class="card">
    <h2 class="section-title">みんなのシフト</h2>

    <div class="field">
      <label for="view-group-select">表示するグループ</label>
      <select id="view-group-select">
        <option value="all">すべてのグループ</option>
      </select>
    </div>

    <ul class="shift-list" id="shift-list">
      <li class="group-empty">読み込み中...</li>
    </ul>
  </div>

  <script type="module" src="js/shifts.js"></script>
</body>
</html>
