<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マップ — Festival Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="map-page">
  <nav class="app-nav wide">
    <span class="who" id="who">読み込み中...</span>
    <div class="app-nav-links">
      <a href="map.html" class="nav-link is-active">マップ</a>
      <a href="events.html" class="nav-link">イベント</a>
      <a href="dashboard.html" class="nav-link">グループ</a>
      <a href="shifts.html" class="nav-link">シフト</a>
    </div>
    <div class="app-nav-right">
      <select id="event-select" class="nav-event-select" hidden></select>
      <button class="link-button" id="logout-btn">ログアウト</button>
    </div>
  </nav>

  <div class="message" id="map-message" role="alert"></div>

  <div class="map-layout">
    <div class="map-pane">
      <div id="leaflet-map"></div>
      <div class="map-hint" id="place-hint">ブースの追加・企画登録は「イベント」タブで行ってください</div>
    </div>

    <div class="side-pane">
      <div class="card" style="max-width:none;">
        <div class="card-header-row">
          <h2 class="section-title">表示するグループ</h2>
          <a href="dashboard.html" class="button-secondary">＋ 参加・作成</a>
        </div>
        <div class="group-checkbox-list" id="group-checkboxes">
          <p class="group-empty">グループに参加すると表示されます</p>
        </div>
      </div>

      <div class="card" style="max-width:none;">
        <div class="card-header-row">
          <h2 class="section-title">現在シフト中</h2>
          <a href="shifts.html" class="button-secondary">＋ シフト提出</a>
        </div>
        <div id="onshift-list">
          <p class="group-empty">読み込み中...</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/map.js"></script>
</body>
</html>
