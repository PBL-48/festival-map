<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>イベント — Festival Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="events-page">
  <nav class="app-nav">
    <span class="who" id="who">読み込み中...</span>
    <div class="app-nav-links">
      <a href="map.html" class="nav-link">マップ</a>
      <a href="events.html" class="nav-link is-active">イベント</a>
      <a href="dashboard.html" class="nav-link">グループ</a>
      <a href="shifts.html" class="nav-link">シフト</a>
    </div>
    <div class="app-nav-right">
      <button class="link-button" id="logout-btn">ログアウト</button>
    </div>
  </nav>

  <div class="message" id="event-message" role="alert"></div>

  <div class="events-layout">
    <div class="card">
      <h1>イベント管理</h1>
      <p class="helper-text">イベントを作成してから、ブースと企画を登録します。シフト提出ではブース名を候補から選べます。</p>

      <form id="create-event-form">
        <div class="field">
          <label for="event-name">イベント名</label>
          <input type="text" id="event-name" placeholder="例: 五月祭" required>
        </div>
        <div class="field">
          <label for="event-date">開催日</label>
          <input type="date" id="event-date" required>
        </div>
        <button type="submit" class="primary">イベントを作成する</button>
      </form>
    </div>

    <div class="card">
      <div class="card-header-row">
        <h2 class="section-title">登録先イベント</h2>
      </div>
      <div class="field">
        <label for="admin-event-select">イベントを選ぶ</label>
        <select id="admin-event-select">
          <option value="">イベントを選択してください</option>
        </select>
      </div>

      <div class="event-summary-grid">
        <div>
          <h3 class="subsection-title">ブース</h3>
          <ul class="compact-list" id="event-booth-list">
            <li class="group-empty">イベントを選ぶと表示されます</li>
          </ul>
        </div>
        <div>
          <h3 class="subsection-title">企画</h3>
          <ul class="compact-list" id="event-program-list">
            <li class="group-empty">イベントを選ぶと表示されます</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header-row">
        <h2 class="section-title">ブースを追加する</h2>
        <span class="badge">地図をクリック</span>
      </div>

      <form id="create-booth-form">
        <div class="field">
          <label for="booth-name">ブース名</label>
          <input type="text" id="booth-name" placeholder="例: たこ焼き店" required>
        </div>
        <div class="event-map-shell">
          <div id="event-booth-map"></div>
          <p class="map-hint static" id="booth-map-hint">地図をクリックしてブースの位置を決めてください</p>
        </div>
        <p class="helper-text" id="booth-coords">座標未設定</p>
        <button type="submit" class="primary">ブースを登録する</button>
      </form>
    </div>

    <div class="card">
      <h2 class="section-title">企画を登録する</h2>

      <form id="create-program-form">
        <div class="field">
          <label for="program-booth-select">ブース</label>
          <select id="program-booth-select" required>
            <option value="">イベントを選択してください</option>
          </select>
        </div>
        <div class="field">
          <label for="program-name">企画名</label>
          <input type="text" id="program-name" placeholder="例: ライブステージ" required>
        </div>
        <div class="field">
          <label for="program-organizer">主催</label>
          <input type="text" id="program-organizer" placeholder="例: 1年有志">
        </div>
        <div class="field-row">
          <div class="field">
            <label for="program-start">開始時刻</label>
            <input type="time" id="program-start">
          </div>
          <div class="field">
            <label for="program-end">終了時刻</label>
            <input type="time" id="program-end">
          </div>
        </div>
        <button type="submit" class="primary">企画を登録する</button>
      </form>
    </div>
  </div>

  <script type="module" src="js/events.js"></script>
</body>
</html>
